site_name: Übung
site_description: Eine einfache Übung für MkDocs
site_author: ich

theme:
  name: material
  language: de
  palette:
  # Heller Modus
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: teal
    accent: teal
    toggle:
      icon: material/weather-night
      name: Zu dunklem Modus wechseln
    # Dunkler Modus
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: teal
    accent: teal
    toggle:
      icon: material/weather-sunny
      name: Zu hellem Modus wechseln
  features:
    - navigation.instant      # Schnelleres Laden
    - navigation.tracking     # URL folgt der Position
    - navigation.tabs         # Hauptkapitel als Reiter
    - navigation.sections     # Gruppen in der Seitenleiste
    - navigation.top          # "Nach oben"-Schaltfläche
    - search.suggest          # Suchvorschläge
    - search.highlight        # Treffer hervorheben
    - content.code.copy       # Code kopieren
    - toc.follow                # Inhaltsverzeichnis folgt der Position  

markdown_extensions: 
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

plugins:
  - search:
      lang: de
  
nav:
  - Startseite: index.md
  - Kapitel 1:
      - Unterkapitel 1.1: TOPICS/TASK/TASK_01.md      
  - Kapitel 2:
      - Unterkapitel 2.1: TOPICS/CONCEPT/Beschreibung.md
      
 

